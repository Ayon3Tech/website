<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ayon3 - Monaco</title>
  <meta name="title" content="Ayon3 - Monaco">
  <meta name="description" content="Together, build your future blockchain-based information technology.">
  <meta name="keywords" content="Ayon3, Blockchain, Information Technology, IT, Monaco, Confidential, Secure">
  <meta name="author" content="Ayon3">
  <meta name="robots" content="index, follow">

  <link rel="icon" type="image/png" href="assets/logo-tiny.png">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
    }
    
    body {
      min-height: 100vh;
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 1rem;
      background-color: rgba(0, 0, 0, 0.7);
      background-size: cover;
      background-position: center;
    }
    
    .container {
      background-color: rgba(0, 0, 0, 1);
      backdrop-filter: blur(4px);
      padding: 2rem;
      border-radius: 0.75rem;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
      display: flex;
      flex-direction: column;
      align-items: center;
      max-width: 28rem;
      width: 100%;
    }
    
    .logo-container {
      margin-bottom: 2rem;
      position: relative;
      width: 20rem;
      height: 20rem;
    }
    
    .logo {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }
    
    .button-container {
      display: flex;
      flex-direction: row;
      gap: 1rem;
      width: 100%;
    }
    
    .button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 0.375rem;
      font-weight: 500;
      padding: 1.5rem 1rem;
      font-size: 1.125rem;
      line-height: 1.5rem;
      text-decoration: none;
      width: 100%;
      cursor: pointer;
      transition: all 0.2s ease;
    }
    
    .primary-button {
      background-color: #000000;
      color: white;
      border: 1px solid #000000;
    }
    
    .primary-button:hover {
      background-color: #333333;
    }
    
    .outline-button {
      background-color:#862627;
      color: #ffffff;
      border: 1px solid #000000;
    }
    
    .outline-button:hover {
      background-color: #494949;
    }
    
    @media (max-width: 640px) {
      .button-container {
        flex-direction: column;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo-container">
      <img src="assets/logo.png" alt="" class="logo">
    </div>
    
    <div class="button-container">
      <!-- <a href="/#" class="button primary-button">My Account</a> -->
      <a href="mailto:contact@ayon3.com?subject=Information%20Request&body=Hello,%20I%20would%20like%20to%20know%20more%20about%20Ayon3." class="button outline-button">Contact us</a>
    </div>
  </div>
</body>
</html>
